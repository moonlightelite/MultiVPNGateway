# /etc/vpn/config.yaml - VPN Namespace Manager Configuration
#
# Read (via regions.sh / yq) by every script — vpn_namespaces.sh and the
# harvesters — so no script hardcodes countries. This file is GENERATED by
# generate_config.sh from a country list; to add / remove / reorder regions,
# re-run it rather than hand-editing, e.g.:
#
#   ./generate_config.sh Taiwan Singapore Netherlands South_Korea Japan
#
# The only field you toggle by hand is `enabled` — and even that has a CLI so you
# needn't edit YAML (it is preserved across regenerations):
#
#   vpn_namespaces.sh disable kr     # take a region out of service
#   vpn_namespaces.sh enable kr      # put it back, then: up kr
#
# Everything else (id, codes, subnets, tables, gateways, paths) is derived.

global:
  uplink_iface: ens18
  client_lan: 192.168.1.0/24
  mtu: 1420
  clamp_mss: true

namespaces:
  - id: tw
    country: Taiwan
    expected_country_code: TW
    gateway_subnet: 172.30.30.0/24
    gateway_ip: 172.30.30.1
    host_veth_ip: 172.30.30.2
    routing_table: 100
    enabled: true
    config_file: /etc/vpn/keys/tw.conf

  - id: sg
    country: Singapore
    expected_country_code: SG
    gateway_subnet: 172.30.31.0/24
    gateway_ip: 172.30.31.1
    host_veth_ip: 172.30.31.2
    routing_table: 101
    enabled: true
    config_file: /etc/vpn/keys/sg.conf

  - id: nl
    country: Netherlands
    expected_country_code: NL
    gateway_subnet: 172.30.32.0/24
    gateway_ip: 172.30.32.1
    host_veth_ip: 172.30.32.2
    routing_table: 102
    enabled: true
    config_file: /etc/vpn/keys/nl.conf

  - id: kr
    country: South_Korea
    expected_country_code: KR
    gateway_subnet: 172.30.33.0/24
    gateway_ip: 172.30.33.1
    host_veth_ip: 172.30.33.2
    routing_table: 103
    enabled: true
    config_file: /etc/vpn/keys/kr.conf

  - id: jp
    country: Japan
    expected_country_code: JP
    gateway_subnet: 172.30.34.0/24
    gateway_ip: 172.30.34.1
    host_veth_ip: 172.30.34.2
    routing_table: 104
    enabled: true
    config_file: /etc/vpn/keys/jp.conf

client_steering:
  rules_file: /etc/vpn/steering/rules.yaml
  block_ipv6: false
